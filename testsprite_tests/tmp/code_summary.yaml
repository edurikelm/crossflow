version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 16 App Router
  - ui_library: Radix UI
  - state_management: Zustand
  - backend: Supabase
  - forms: React Hook Form + Zod
  - styling: Tailwind CSS
routes:
  - path: /login
    file: src/app/(auth)/login/page.tsx
    auth_required: false
    description: User login page with email/password
  - path: /
    file: src/app/(dashboard)/page.tsx
    auth_required: true
    description: Main dashboard with metrics, today's classes, recent tickets
  - path: /athletes
    file: src/app/(dashboard)/athletes/page.tsx
    auth_required: true
    description: Athletes list and management
  - path: /coaches
    file: src/app/(dashboard)/coaches/page.tsx
    auth_required: true
    description: Coaches list and management
  - path: /classes
    file: src/app/(dashboard)/classes/page.tsx
    auth_required: true
    description: Class templates management
  - path: /calendar
    file: src/app/(dashboard)/calendar/page.tsx
    auth_required: true
    description: Schedule calendar with scheduled classes
  - path: /tickets
    file: src/app/(dashboard)/tickets/page.tsx
    auth_required: true
    description: Support tickets management
  - path: /notifications
    file: src/app/(dashboard)/notifications/page.tsx
    auth_required: true
    description: Notifications list
  - path: /settings
    file: src/app/(dashboard)/settings/page.tsx
    auth_required: true
    description: Gym settings
features:
  - name: User Login
    description: Login with email and password credentials using Supabase Auth
    files:
      - src/app/(auth)/login/page.tsx
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
      - See error message on invalid credentials
      - Click "Forgot password" to request password reset
    api_calls:
      - method: POST
        endpoint: Supabase Auth signInWithPassword
    auth_required: false
  - name: Dashboard
    description: Main dashboard showing gym metrics, today's classes, and recent tickets
    files:
      - src/app/(dashboard)/page.tsx
    entry_route: /
    user_interactions:
      - View statistics cards (athletes, classes, tickets)
      - View today's scheduled classes
      - View recent tickets
      - Navigate to detailed pages via links
    api_calls:
      - GET athletes count (total and active)
      - GET scheduled_classes for today
      - GET tickets with open/in_progress status
    auth_required: true
  - name: Athletes Management
    description: List and manage athletes in the gym
    files:
      - src/app/(dashboard)/athletes/page.tsx
    entry_route: /athletes
    user_interactions:
      - View athletes list in table
      - Search athletes
      - Add new athlete
      - Edit athlete details
      - Toggle athlete active status
    api_calls:
      - GET athletes with profiles
      - POST/PATCH athletes
    auth_required: true
  - name: Coaches Management
    description: List and manage coaches
    files:
      - src/app/(dashboard)/coaches/page.tsx
    entry_route: /coaches
    user_interactions:
      - View coaches list
      - Add new coach
      - Edit coach details
    api_calls:
      - GET coaches with profiles
      - POST/PATCH coaches
    auth_required: true
  - name: Classes Management
    description: Class templates management
    files:
      - src/app/(dashboard)/classes/page.tsx
    entry_route: /classes
    user_interactions:
      - View class templates list
      - Create new class template
      - Edit class template
    api_calls:
      - GET class_templates
      - POST/PATCH class_templates
    auth_required: true
  - name: Calendar
    description: Schedule calendar for classes
    files:
      - src/app/(dashboard)/calendar/page.tsx
    entry_route: /calendar
    user_interactions:
      - View calendar with scheduled classes
      - Schedule new class
      - Edit scheduled class
    api_calls:
      - GET scheduled_classes
      - POST/PATCH scheduled_classes
    auth_required: true
  - name: Tickets Management
    description: Support tickets management
    files:
      - src/app/(dashboard)/tickets/page.tsx
    entry_route: /tickets
    user_interactions:
      - View tickets list
      - Create new ticket
      - Update ticket status
      - Filter by status/priority
    api_calls:
      - GET tickets
      - POST/PATCH tickets
    auth_required: true
known_limitations: []